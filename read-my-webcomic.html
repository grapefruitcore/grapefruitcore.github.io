<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Read my Webcomic</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f3ef;          /* off-white, paper-like */
      --ink: #111;            /* dark ink */
      --accent: #ff2e63;      /* neon pink accent */
      --muted: #666;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header */
    header {
      text-align: center;
      padding: 0.5rem;
      border-bottom: 2px solid var(--ink);
    }

    header h1 {
      font-family: 'UnifrakturCook', 'Blackletter', 'Old English Text MT', serif;
      font-weight: 700; 
      margin: 0;
      letter-spacing: 1px;
    }

    body.focus-mode header {
      display: none;
    }

    body.focus-mode main {
      height: 100vh;
    }

    .focus-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .focus-btn:hover {
      background: #d91f55;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
    button, input {
      background: transparent;
      border: 2px solid var(--ink);
      padding: 0.4rem 0.8rem;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: var(--accent);
      color: #fff;
    }
    .page-input {
      width: 60px;
      text-align: center;
    }

    /* Toggle Button for Censored Content */
    .censored-toggle {
      background: var(--ink);
      color: #fff;
      font-weight: bold;
      border-color: var(--ink);
    }
    .censored-toggle:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* Overlay container anchored to bottom INSIDE the comic canvas */
    .nav-overlay {
      position: absolute;
      bottom: 8px;              /* small gap from bottom of image */
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 12px;          /* keeps buttons close to page edge */
      pointer-events: none;     /* only buttons are clickable */
    }

    /* Angle bracket buttons */
    .overlay-btn {
      pointer-events: auto;
      background: none;
      border: none;
      font-size: 2.5rem;        /* large angle brackets */
      font-weight: 700;
      color: var(--ink);
      cursor: pointer;
      line-height: 1;
      padding: 0;
      margin: 0;
      transition: color 0.2s, transform 0.1s;
    }

    .overlay-btn:hover {
      color: var(--accent);
      background: transparent; /* Override default button hover */
    }

    .overlay-btn:active {
      transform: translateY(2px);
    }

    .overlay-btn[disabled] {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Viewer */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden; /* prevent double scrollbars */
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      height: calc(100vh - 120px); /* subtract header/footer height */
    }

    .canvas {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      max-width: 965px;   /* never exceed original size */
      max-height: 1250px;
      width: 100%;
      height: 100%;
    }

    .page {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    /* Footer */
    footer {
      padding: 1rem;
      border-top: 2px solid var(--ink);
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .progress {
      flex: 1;
      height: 6px;
      background: var(--muted);
      margin-left: 1rem;
      position: relative;
    }
    .bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
    }

    /* Popup Styling */
    .content-warning {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    /* CRITICAL FIX: Ensure hidden actually works */
    .content-warning[hidden], button[hidden], div[hidden] {
      display: none !important;
    }

    .cw-box {
      background: var(--bg);
      color: var(--ink);
      padding: 2rem;
      border: 3px solid var(--ink);
      max-width: 420px;
      text-align: center;
      box-shadow: 8px 8px 0 var(--accent);
    }

    .cw-actions {
      margin-top: 1.5rem;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
    }

    .cw-actions button {
      flex: 1;
      padding: 0.6rem 1rem;
      border: 2px solid var(--ink);
      background: var(--bg);
      cursor: pointer;
      font-weight: 700;
    }

    .cw-actions button:hover {
      background: var(--accent);
      color: #fff;
    }

    /* --- Interactive Room CSS --- */
    .explore-banner {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg);
      border: 3px solid var(--ink);
      padding: 8px 16px;
      box-shadow: 4px 4px 0 var(--accent);
      z-index: 10;
      font-weight: 700;
      color: var(--ink);
      text-align: center;
      pointer-events: none;
      font-family: inherit;
      animation: bannerBounce 2s infinite ease-in-out;
    }

    @keyframes bannerBounce {
      0%, 100% { transform: translate(-50%, 0); }
      50% { transform: translate(-50%, -6px); }
    }

    .interactive-overlay {
      position: absolute;
      pointer-events: none;
      z-index: 5;
    }

    .hotspot-btn {
      position: absolute;
      pointer-events: auto;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #0056ff;
      border: none;
      opacity: 0.65;
      cursor: pointer;
      transform: translate(-50%, -50%);
      transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s, opacity 0.2s;
      animation: hotspotPulse 1.5s infinite alternate ease-in-out;
    }

    .hotspot-btn::after {
      content: '';
      position: absolute;
      top: -12px;
      left: -12px;
      right: -12px;
      bottom: -12px;
      border-radius: 50%;
    }

    .hotspot-btn:hover {
      background-color: #3b82f6;
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.15);
      box-shadow: 0 0 10px rgba(0, 86, 255, 0.8);
    }

    @keyframes hotspotPulse {
      0% {
        box-shadow: 0 0 2px rgba(0, 86, 255, 0.4);
      }
      100% {
        box-shadow: 0 0 10px rgba(0, 86, 255, 0.8);
      }
    }

    /* Room Popup Modal */
    .room-popup {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .popup-box {
      background: var(--bg);
      color: var(--ink);
      padding: 1.5rem;
      border: 3px solid var(--ink);
      max-width: 80%;
      max-height: 80%;
      text-align: center;
      box-shadow: 8px 8px 0 var(--accent);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .popup-img-wrapper {
      max-width: 100%;
      max-height: 60vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .popup-img {
      max-width: 100%;
      max-height: 60vh;
      object-fit: contain;
      display: block;
    }

    .popup-close {
      position: absolute;
      top: -16px;
      right: -16px;
      background: var(--bg);
      color: var(--ink);
      border: 3px solid var(--ink);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 3px 3px 0 var(--accent);
      transition: background 0.15s, color 0.15s, transform 0.1s;
    }

    .popup-close:hover {
      background: var(--accent);
      color: #fff;
      transform: scale(1.05);
    }
    
    .popup-close:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 var(--accent);
    }
  </style>
</head>
<body>
  <header>
    <h1>Berlin</h1>
    <div class="controls" aria-label="Top controls">
      <button id="prevTop" title="Previous (←)">⟨</button>
      <button id="nextTop" title="Next (→)">⟩</button>
      
      <div class="page-jump">
        <label for="pageInput" class="info">Page</label>
        <input id="pageInput" class="page-input" type="number" min="1" value="1" />
        <button id="goBtn" class="primary" title="Go to page">Go</button>
      </div>

      <!-- New Censored Toggle Button -->
      <button id="censoredToggle" class="censored-toggle" hidden>Show Uncensored Page</button>

      <div class="info" id="countInfo">of 0</div>
    </div>
  </header>

  <main>
    <div class="canvas">
      <img id="pageImg" class="page" alt="Comic page" />
      <div id="loading" class="loading" hidden>Loading…</div>
      <div id="error" class="error" hidden>Couldn't load this page.</div>

      <!-- Explore invitation banner -->
      <div id="exploreBanner" class="explore-banner" hidden>
        🔍 Explore Charlie's room
      </div>

      <!-- Interactive Hotspots Overlay -->
      <div id="interactiveOverlay" class="interactive-overlay" hidden></div>

      <!-- Popup for Room Items -->
      <div id="roomPopup" class="room-popup" hidden>
        <div class="popup-box">
          <button id="closePopup" class="popup-close" title="Close (Esc)">×</button>
          <div class="popup-img-wrapper">
            <img id="popupImg" class="popup-img" src="" alt="Room detail" />
          </div>
        </div>
      </div>

      <!-- Popup for Blocking Content (View/Skip) -->
      <div id="contentWarning" class="content-warning" hidden>
        <div class="cw-box">
          <h2>Sensitive Content</h2>
          <p>Are you sure you want to view this page?</p>
          <div class="cw-actions">
            <button id="cwView">View Page</button>
            <button id="cwSkip">Skip Page</button>
          </div>
        </div>
      </div>

      <div class="nav-overlay">
        <button id="prevOverlay" class="overlay-btn" title="Previous page">◀</button>
        <button id="nextOverlay" class="overlay-btn" title="Next page">▶</button>
      </div>
    </div>
  </main>
  
  <button id="toggleFocus" class="focus-btn" title="Toggle focus mode">▲</button>

  <footer>
    <div class="info">Use ← → keys. Enter a page number to jump.</div>
    <div class="progress" aria-label="Reading progress">
      <div id="bar" class="bar"></div>
    </div>
  </footer>

  <script>
    // PAGE CONFIGURATION
    // You can now use strings for normal pages OR objects for special pages.
    const PAGES = [
      "img/berlin/cover_2.png",
      "img/berlin/page1.png",
      "img/berlin/page2.png",
      "img/berlin/page3.png",
      "img/berlin/page4.png",
      "img/berlin/page5.png",
      "img/berlin/page6.png",
      "img/berlin/page7.png",
      "img/berlin/page8.png",
      "img/berlin/page9.png",
      "img/berlin/page10.png",
      "img/berlin/page11.png",
      "img/berlin/page12.png",
      "img/berlin/page13.png",
      "img/berlin/page14.png",
      "img/berlin/page15.png",
      "img/berlin/page16.png",
      "img/berlin/page17.png",
      "img/berlin/page18.png",
      "img/berlin/page19.png",
      "img/berlin/page20.png",
      
      // TYPE 1: "warning" - Blocks the page until user clicks View
      { 
        src: "img/berlin/page21.png", 
        type: "warning" 
      },
	  "img/berlin/page22.png",
      
      // TYPE 2: "censored" - Shows censored version, allows toggle to original
      // This assumes you have "page23_censored.png" and "page23.png"
      { 
        src: "img/berlin/page23.png", 
        type: "censored" 
      },
	  "img/berlin/page24.png",
	  "img/berlin/page25.png",
	  "img/berlin/page26.png",
	  "img/berlin/page27.png",
	  "img/berlin/page28.png",
	  "img/berlin/page29.png",
	  "img/berlin/page30.png",
	  "img/berlin/page31.png",
	  "img/berlin/page32.png",
	  "img/berlin/page33.png",
	  "img/berlin/page34.png",
      { 
        src: "img/berlin/page35.png", 
        type: "interactive-room" 
      }
    ];

    const img = document.getElementById('pageImg');
    const loading = document.getElementById('loading');
    const errorMsg = document.getElementById('error');
    const bar = document.getElementById('bar');
    const countInfo = document.getElementById('countInfo');
    const pageInput = document.getElementById('pageInput');
    const censoredToggle = document.getElementById('censoredToggle');

    // Interactive Room elements
    const interactiveOverlay = document.getElementById('interactiveOverlay');
    const exploreBanner = document.getElementById('exploreBanner');
    const roomPopup = document.getElementById('roomPopup');
    const popupImg = document.getElementById('popupImg');
    const closePopup = document.getElementById('closePopup');

    const buttons = {
      prevTop: document.getElementById('prevTop'),
      nextTop: document.getElementById('nextTop'),
      prevOverlay: document.getElementById('prevOverlay'),
      nextOverlay: document.getElementById('nextOverlay'),
      goBtn: document.getElementById('goBtn'),
    };

    let index = 0; // zero-based
    let warningAccepted = false; // For "blocked" pages
    let showUncensored = false;  // For "censored" pages state

    // Hotspots configuration for page 35
    const HOTSPOTS = [
      { x: 10.88, y: 51.49, file: "room_dictionary.png", title: "Dictionary" },
      { x: 20.50, y: 42.71, file: "room_lamp.png", title: "Lamp" },
      { x: 28.22, y: 82.67, file: "room_backpack.png", title: "Backpack" },
      { x: 29.39, y: 55.20, file: "room_drawer.png", title: "Drawer" },
      { x: 47.05, y: 49.44, file: "room_rabbit.png", title: "Rabbit" },
      { x: 71.19, y: 77.80, file: "room_laundry.png", title: "Laundry" },
      { x: 92.08, y: 46.45, file: "room_wall.png", title: "Bookshelf" }
    ];

    function initHotspots() {
      interactiveOverlay.innerHTML = '';
      HOTSPOTS.forEach(h => {
        const btn = document.createElement('button');
        btn.className = 'hotspot-btn';
        btn.style.left = `${h.x}%`;
        btn.style.top = `${h.y}%`;
        btn.title = `Inspect ${h.title}`;
        btn.setAttribute('aria-label', `Inspect ${h.title}`);
        
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          popupImg.src = `img/berlin/${h.file}`;
          roomPopup.hidden = false;
        });
        
        interactiveOverlay.appendChild(btn);
      });
    }

    function updateInteractiveOverlay() {
      const pageConfig = PAGES[index];
      const isInteractive = typeof pageConfig === 'object' && pageConfig.type === 'interactive-room';
      
      if (!isInteractive) {
        interactiveOverlay.hidden = true;
        exploreBanner.hidden = true;
        roomPopup.hidden = true;
        return;
      }
      
      interactiveOverlay.hidden = false;
      exploreBanner.hidden = false;
      
      if (img.clientWidth && img.clientHeight) {
        interactiveOverlay.style.left = `${img.offsetLeft}px`;
        interactiveOverlay.style.top = `${img.offsetTop}px`;
        interactiveOverlay.style.width = `${img.clientWidth}px`;
        interactiveOverlay.style.height = `${img.clientHeight}px`;
      }
    }

    // Initialize Hotspots layout
    initHotspots();

    const cw = document.getElementById("contentWarning");
    const cwView = document.getElementById("cwView");
    const cwSkip = document.getElementById("cwSkip");

    // --- Events for Blocking Popup ---
    cwView.addEventListener("click", () => {
      warningAccepted = true; // User accepted the warning
      cw.hidden = true;       // Hide the box
      goTo(index);            // Reload the current page to show image
    });

    cwSkip.addEventListener("click", () => {
      cw.hidden = true;       
      goTo(index + 1);        // Skip to next page
    });

    // --- Events for Censored Toggle ---
    censoredToggle.addEventListener("click", () => {
      showUncensored = !showUncensored;
      
      // Update Button Text
      censoredToggle.textContent = showUncensored ? "Hide Uncensored Page" : "Show Uncensored Page";
      
      // Reload image with new state
      const pageConfig = PAGES[index];
      if (typeof pageConfig === 'object' && pageConfig.type === 'censored') {
         const src = showUncensored ? pageConfig.src : getCensoredPath(pageConfig.src);
         img.src = src;
      }
    });

    function getCensoredPath(originalPath) {
      // Looks for "filename.ext" and returns "filename_censored.ext"
      const parts = originalPath.split('.');
      const ext = parts.pop();
      return parts.join('.') + '_censored.' + ext;
    }

    function updateUI() {
      const total = PAGES.length;
      countInfo.textContent = `of ${total - 1}`;
      pageInput.max = String(total - 1);
      pageInput.value = String(index);

      const atStart = index <= 0;
      const atEnd = index >= total - 1;
      buttons.prevTop.disabled = atStart;
      buttons.prevOverlay.disabled = atStart;
      buttons.nextTop.disabled = atEnd;
      buttons.nextOverlay.disabled = atEnd;

      const progress = total > 1 ? (index / (total - 1)) * 100 : 100;
      bar.style.width = `${progress}%`;
    }

    function showLoading(isLoading) {
      loading.hidden = !isLoading;
      errorMsg.hidden = true;
    }

    function showError(message) {
      errorMsg.textContent = message || "Couldn't load this page.";
      errorMsg.hidden = false;
    }

    function preloadNeighbors(i) {
      [i - 1, i + 1].forEach(n => {
        if (n >= 0 && n < PAGES.length) {
          // Simplistic preload for strings or object.src
          const p = PAGES[n];
          const src = (typeof p === 'string') ? p : p.src;
          const pre = new Image();
          pre.src = src;
        }
      });
    }
    
    function setCookie(name, value, days = 180) {
      const date = new Date();
      date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000);
      const expires = "expires=" + date.toUTCString();
      document.cookie = `${encodeURIComponent(name)}=${encodeURIComponent(value)};${expires};path=/;SameSite=Lax`;
    }

    function getCookie(name) {
      const key = encodeURIComponent(name) + "=";
      const parts = document.cookie.split("; ");
      for (const part of parts) {
        if (part.indexOf(key) === 0) {
          return decodeURIComponent(part.substring(key.length));
        }
      }
      return null;
    }

    function goTo(i) {
      const total = PAGES.length;
      if (total === 0) return;

      // Clamp index
      i = Math.max(0, Math.min(i, total - 1));

      // Reset UI elements for the new page
      const cw = document.getElementById("contentWarning");
      cw.hidden = true; // Hide popup
      censoredToggle.hidden = true; // Hide toggle button
      
      // Hide interactive elements immediately
      interactiveOverlay.hidden = true;
      exploreBanner.hidden = true;
      roomPopup.hidden = true;

      // If we are moving to a NEW page, reset page-specific states
      if (i !== index) {
        warningAccepted = false; // Reset blocking warning
        showUncensored = false;  // Reset censored toggle
        censoredToggle.textContent = "Show Uncensored Page";
      }

      // Determine Page Type
      const pageConfig = PAGES[i];
      const isObject = typeof pageConfig === 'object';
      const type = isObject ? pageConfig.type : 'normal';
      const originalSrc = isObject ? pageConfig.src : pageConfig;

      // --- LOGIC: TYPE "WARNING" (The Blocking Popup) ---
      if (type === 'warning' && !warningAccepted) {
        cw.hidden = false; // Show popup
        index = i;
        updateUI();
        return; // STOP. Do not load image.
      }

      // --- LOGIC: TYPE "CENSORED" (The Toggle) ---
      let actualSrc = originalSrc;
      if (type === 'censored') {
        censoredToggle.hidden = false; // Show the toggle button
        
        if (!showUncensored) {
          actualSrc = getCensoredPath(originalSrc); // Load censored version
        }
      }

      // Proceed to Load
      index = i;
      setCookie("comic_last_index", index);
      updateUI();
      showLoading(true);

      const loader = new Image();
      loader.decoding = 'async';
      loader.src = actualSrc;

      loader.onload = () => {
        img.src = actualSrc;
        // Keep original aspect ratio handling or fixed logic
        img.width = loader.naturalWidth || 965;
        img.height = loader.naturalHeight || 1250;
        showLoading(false);
        preloadNeighbors(index);
        
        // Update overlay dimensions now that the image is loaded
        updateInteractiveOverlay();
      };

      loader.onerror = () => {
        showLoading(false);
        showError('Failed to load page. Try again or check the image path.');
      };
    }

    // Events
    function prev() { goTo(index - 1); }
    function next() { goTo(index + 1); }

    [buttons.prevTop, buttons.prevOverlay].forEach(b => b.addEventListener('click', prev));
    [buttons.nextTop, buttons.nextOverlay].forEach(b => b.addEventListener('click', next));
    
    document.getElementById('toggleFocus').addEventListener('click', () => {
      document.body.classList.toggle('focus-mode');
    });

    buttons.goBtn.addEventListener('click', () => {
      const val = parseInt(pageInput.value, 10);
      if (Number.isFinite(val)) goTo(val); 
    });

    pageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const val = parseInt(pageInput.value, 10);
        if (Number.isFinite(val)) goTo(val);
      }
    });

    // Close room popup events
    closePopup.addEventListener('click', () => {
      roomPopup.hidden = true;
    });

    roomPopup.addEventListener('click', (e) => {
      if (e.target === roomPopup) {
        roomPopup.hidden = true;
      }
    });

    // Handle Resize to reposition hotspots overlay
    window.addEventListener('resize', updateInteractiveOverlay);

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        roomPopup.hidden = true;
      } else if (roomPopup.hidden) {
        // Only allow arrow navigation when popup is closed
        if (e.key === 'ArrowLeft') prev();
        else if (e.key === 'ArrowRight') next();
      }
    });

    // Touch Swipe
    (function enableSwipe() {
      let startX = null;
      let startY = null;
      const threshold = 40;
      const canvas = document.querySelector('.canvas');

      canvas.addEventListener('touchstart', (e) => {
        const t = e.touches[0];
        startX = t.clientX;
        startY = t.clientY;
      }, { passive: true });

      canvas.addEventListener('touchend', (e) => {
        if (!roomPopup.hidden) return; // Prevent swiping when detail popup is active
        if (startX == null || startY == null) return;
        const t = e.changedTouches[0];
        const dx = t.clientX - startX;
        const dy = t.clientY - startY;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > threshold) {
          if (dx < 0) next(); else prev();
        }
        startX = startY = null;
      }, { passive: true });
    })();

    // Initialize
    updateUI();
    const saved = parseInt(getCookie("comic_last_index"), 10);
    if (Number.isFinite(saved) && saved >= 0 && saved < PAGES.length) {
      goTo(saved);
    } else {
      goTo(0);
    }

  </script>
</body>
</html>
